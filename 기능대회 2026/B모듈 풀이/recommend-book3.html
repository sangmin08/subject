<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root {
        --sp: 0.5s;
        --ez: cubic-bezier(0.25, 1, 0.5, 1);
        --in-R: enterRight var(--sp) var(--ez) forwards;
        --out-L: exitLeft var(--sp) var(--ez) forwards;
        --in-L: enterLeft var(--sp) var(--ez) forwards;
        --out-R: exitRight var(--sp) var(--ez) forwards;
      }

      /* 기본 레이아웃 및 숨김 처리 */
      .book-slider {
        position: relative;
        width: 800px;
        height: 500px;
        overflow: hidden;
        margin: 0 auto;
        background: #fff;
      }

      input[name="slider"] {
        display: none;
      }

      .slides-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .slide {
        position: absolute;
        inset: 0;
        display: none;
        background: #fff;
      }

      .slide img {
        width: 100%;
        height: 100%;
      }

      /* 키프레임 (방향 정의) */
      @keyframes enterRight {
        from {
          transform: translateX(100%);
        }

        to {
          transform: translateX(0);
        }
      }

      @keyframes exitLeft {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(-100%);
        }
      }

      @keyframes enterLeft {
        from {
          transform: translateX(-100%);
        }

        to {
          transform: translateX(0);
        }
      }

      @keyframes exitRight {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(100%);
        }
      }

      /* 컨트롤 박스 공통 디자인 */
      .controls {
        display: none;
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        justify-content: center;
        align-items: center;
        gap: 30px;
        z-index: 10;
      }

      .controls label {
        cursor: pointer;
        padding: 10px 20px;
        background: #333;
        color: #fff;
        border-radius: 5px;
        animation: disableClick var(--sp) forwards;
      }

      @keyframes disableClick {
        0%,
        99% {
          pointer-events: none;
        }

        100% {
          pointer-events: auto;
        }
      }

      [id^="r1-"]:checked ~ .controls-1,
      [id^="r2-"]:checked ~ .controls-2,
      [id^="r3-"]:checked ~ .controls-3,
      [id^="r4-"]:checked ~ .controls-4 {
        display: flex;
      }

      #r1-def:checked ~ .slides-container .slide1 {
        display: block;
      }

      /* 1번으로 진입 */
      #r1-next:checked ~ .slides-container .slide1 {
        display: block;
        animation: var(--in-R);
      }

      #r1-next:checked ~ .slides-container .slide4 {
        display: block;
        animation: var(--out-L);
      }

      /* <- 이전 슬라이드 번호(최대값) */
      #r1-prev:checked ~ .slides-container .slide1 {
        display: block;
        animation: var(--in-L);
      }

      #r1-prev:checked ~ .slides-container .slide2 {
        display: block;
        animation: var(--out-R);
      }

      /* 2번으로 진입 */
      #r2-next:checked ~ .slides-container .slide2 {
        display: block;
        animation: var(--in-R);
      }

      #r2-next:checked ~ .slides-container .slide1 {
        display: block;
        animation: var(--out-L);
      }

      #r2-prev:checked ~ .slides-container .slide2 {
        display: block;
        animation: var(--in-L);
      }

      #r2-prev:checked ~ .slides-container .slide3 {
        display: block;
        animation: var(--out-R);
      }

      /* 3번으로 진입 */
      #r3-next:checked ~ .slides-container .slide3 {
        display: block;
        animation: var(--in-R);
      }

      #r3-next:checked ~ .slides-container .slide2 {
        display: block;
        animation: var(--out-L);
      }

      #r3-prev:checked ~ .slides-container .slide3 {
        display: block;
        animation: var(--in-L);
      }

      #r3-prev:checked ~ .slides-container .slide4 {
        display: block;
        animation: var(--out-R);
      }

      /* 4번으로 진입 */
      #r4-next:checked ~ .slides-container .slide4 {
        display: block;
        animation: var(--in-R);
      }

      #r4-next:checked ~ .slides-container .slide3 {
        display: block;
        animation: var(--out-L);
      }

      #r4-prev:checked ~ .slides-container .slide4 {
        display: block;
        animation: var(--in-L);
      }

      #r4-prev:checked ~ .slides-container .slide1 {
        display: block;
        animation: var(--out-R);
      }
    </style>
  </head>

  <body>
    <div class="book-slider">
      <input type="radio" name="slider" id="r1-def" checked />
      <input type="radio" name="slider" id="r1-next" /><input
        type="radio"
        name="slider"
        id="r1-prev"
      />
      <input type="radio" name="slider" id="r2-next" /><input
        type="radio"
        name="slider"
        id="r2-prev"
      />
      <input type="radio" name="slider" id="r3-next" /><input
        type="radio"
        name="slider"
        id="r3-prev"
      />
      <input type="radio" name="slider" id="r4-next" /><input
        type="radio"
        name="slider"
        id="r4-prev"
      />
      <div class="slides-container">
        <div class="slide slide1"><img src="image1.jpg" /></div>
        <div class="slide slide2"><img src="image2.jpg" /></div>
        <div class="slide slide3"><img src="image3.jpg" /></div>
        <div class="slide slide4"><img src="image4.jpg" /></div>
      </div>

      <div class="controls controls-1">
        <label for="r4-prev" class="btn-prev">이전</label> <span>1 / 4</span>
        <label for="r2-next" class="btn-next">다음</label>
      </div>
      <div class="controls controls-2">
        <label for="r1-prev" class="btn-prev">이전</label> <span>2 / 4</span>
        <label for="r3-next" class="btn-next">다음</label>
      </div>
      <div class="controls controls-3">
        <label for="r2-prev" class="btn-prev">이전</label> <span>3 / 4</span>
        <label for="r4-next" class="btn-next">다음</label>
      </div>
      <div class="controls controls-4">
        <label for="r3-prev" class="btn-prev">이전</label> <span>4 / 4</span>
        <label for="r1-next" class="btn-next">다음</label>
      </div>
    </div>
  </body>
</html>
